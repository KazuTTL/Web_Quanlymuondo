<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quản Lý Mượn Thiết Bị</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Courier New', monospace;
      background: #f5f5f5;
      color: #1a1a1a;
      line-height: 1.6;
    }

    :root {
      --bg: #f5f5f5;
      --white: #ffffff;
      --black: #1a1a1a;
      --accent: #ff6b35;
      --success: #22c55e;
      --danger: #ef4444;
      --warning: #f59e0b;
      --border: 3px solid var(--black);
      --shadow: 4px 4px 0 var(--black);
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
